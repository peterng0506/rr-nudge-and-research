<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報案室行為觀察系統</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --police-blue: #00205B;
            --success-green: #2E7D32;
            --warning-red: #C62828;
            --neutral-gray-50: #F8FAFC;
            --neutral-gray-200: #CBD5E1;
            --neutral-gray-300: #94A3B8;
            --neutral-gray-400: #64748B;
            --neutral-gray-800: #1E293B;
            --orange-warning: #F59E0B;
            --orange-bg: #FFFBEB;
            --danger-bg: #FEE2E2;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 3px 8px rgba(0,0,0,0.09);
            --radius-sm: 6px;
            --radius-md: 12px;
            --transition-fast: all 0.2s ease-in-out;
            --google-blue: #4285F4;
            --upload-green: #2E7D32;
            --clear-red: #C62828;
        }
        * { box-sizing: border-box; }
        body {
            font-family: Arial, "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            background-color: var(--neutral-gray-50);
            margin: 0;
            padding: 16px;
            color: var(--neutral-gray-800);
            line-height: 1.6;
            font-size: 14px;
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
        }
        h3 {
            margin-top: 0;
            color: var(--police-blue);
            border-bottom: 2px solid var(--neutral-gray-200);
            padding-bottom: 8px;
            font-weight: 700;
            font-size: 18px;
        }
        h4 {
            margin: 16px 0 8px;
            font-size: 15px;
            font-weight: 600;
            color: var(--neutral-gray-800);
        }
        .required { color: var(--warning-red); }
        .privacy-banner {
            background-color: var(--orange-bg);
            color: #B45309;
            padding: 10px 16px;
            border-left: 6px solid var(--orange-warning);
            margin-bottom: 16px;
            font-size: 13px;
            border-radius: var(--radius-sm);
            font-weight: 500;
        }
        .global-info-panel {
            background: #fff;
            padding: 18px 22px;
            border-radius: var(--radius-md);
            border: 1px solid var(--neutral-gray-200);
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }
        .global-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .form-item {
            flex: 1;
            min-width: 150px;
        }
        .form-item label {
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--neutral-gray-200);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition-fast);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--police-blue);
            box-shadow: 0 0 0 3px rgba(0, 56, 168, 0.12);
        }
        .form-input-number {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--neutral-gray-200);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition-fast);
            -moz-appearance: textfield;
        }
        .form-input-number::-webkit-outer-spin-button,
        .form-input-number::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .form-input-number:focus {
            outline: none;
            border-color: var(--police-blue);
            box-shadow: 0 0 0 3px rgba(0, 56, 168, 0.12);
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0;
        }
        .select-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 6px;
            font-size: 13px;
            border: 1px solid var(--neutral-gray-200);
            background: #fff;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .select-btn:hover:not(.active) { background-color: var(--neutral-gray-100); }
        .select-btn.active {
            background-color: var(--police-blue);
            color: white;
            border-color: var(--police-blue);
            font-weight: 600;
        }
        .obs-card {
            background: #fff;
            border-radius: var(--radius-md);
            border: 2px solid var(--neutral-gray-200);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-fast);
            margin-bottom: 20px;
        }
        .obs-card.running {
            border-color: var(--success-green);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
        }
        .obs-card.paused {
            border-color: var(--orange-warning);
        }
        .col-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--neutral-gray-100);
            flex-wrap: wrap;
            gap: 8px;
        }
        .col-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .col-label {
            font-weight: 700;
            font-size: 18px;
            color: var(--police-blue);
        }
        .case-id-input-small {
            width: 150px;
            padding: 6px 8px;
            border: 1px solid var(--police-blue);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            color: var(--police-blue);
            text-align: center;
            letter-spacing: 0.5px;
            transition: var(--transition-fast);
        }
        .case-id-input-small:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 56, 168, 0.12);
        }
        .col-status {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--neutral-gray-200);
            color: #333;
            margin-left: 6px;
            font-weight: 600;
            transition: var(--transition-fast);
        }
        .obs-card.running .col-status {
            background: var(--success-green);
            color: #fff;
        }
        .obs-card.paused .col-status {
            background: var(--orange-warning);
            color: #fff;
        }
        .stopwatch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--neutral-gray-50);
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            border: 1px solid var(--neutral-gray-200);
            flex-wrap: wrap;
            gap: 12px;
        }
        .col-stopwatch {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--neutral-gray-800);
            font-variant-numeric: tabular-nums;
        }
        .col-control-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition-fast);
        }
        .ctrl-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(50%);
        }
        .btn-start { background: var(--success-green); color: #fff; }
        .btn-reset { background: #64748B; color: #fff; }
        .col-timeline-section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px dashed var(--neutral-gray-200);
        }
        .timeline-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 10px;
            color: var(--neutral-gray-800);
            font-weight: 500;
            flex-wrap: wrap;
            gap: 6px;
        }
        .timeline-wrap {
            overflow-x: auto;
            overflow-y: hidden;
            height: 80px;
            background: var(--neutral-gray-50);
            border: 1px solid var(--neutral-gray-200);
            border-radius: var(--radius-sm);
            position: relative;
            padding: 16px 0;
            scroll-behavior: smooth;
        }
        .timeline-track {
            height: 4px;
            background: var(--neutral-gray-300);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            min-width: 100%;
        }
        .timeline-now-line {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: var(--warning-red);
            z-index: 2;
        }
        .timeline-event {
            position: absolute;
            transform: translateX(-50%);
            top: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 3;
            background: var(--police-blue);
            color: #fff;
        }
        .timeline-event.pending-event {
            background: var(--orange-warning);
            color: #fff;
        }
        .timeline-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            position: absolute;
            top: calc(50% - 3.5px);
            transform: translateX(-50%);
            z-index: 3;
            background: var(--police-blue);
        }
        .timeline-dot.pending-dot {
            background: var(--orange-warning);
        }
        .timeline-note {
            font-size: 12px;
            color: var(--neutral-gray-400);
            margin-top: 8px;
            line-height: 1.4;
        }
        .actions-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .action-pair {
            display: flex;
            border: 1px solid var(--neutral-gray-200);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #fff;
            transition: var(--transition-fast);
            min-height: 48px;
        }
        .action-pair:hover {
            border-color: var(--police-blue);
        }
        .action-btn-main {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            border: none;
            cursor: pointer;
            text-align: left;
            font-weight: 600;
            transition: var(--transition-fast);
            min-height: 48px;
            display: flex;
            align-items: center;
        }
        .action-btn-main:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .action-btn-note {
            padding: 0 12px;
            border: none;
            border-left: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            transition: var(--transition-fast);
            min-width: 60px;
            min-height: 48px;
            background: var(--neutral-gray-100);
            color: var(--neutral-gray-800);
        }
        .action-btn-note:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .action-btn-note:hover:not(:disabled) {
            filter: brightness(0.9);
        }
        .action-pair.group-1 { background: #E3F2FD; border-color: #64B5F6; }
        .action-pair.group-1 .action-btn-main { background: #E3F2FD; color: #0D47A1; }
        .action-pair.group-1 .action-btn-note { background: #1976D2; color: #fff; border-left-color: #64B5F6; }
        .action-pair.group-2 { background: #E8F5E9; border-color: #81C784; }
        .action-pair.group-2 .action-btn-main { background: #E8F5E9; color: #1B5E20; }
        .action-pair.group-2 .action-btn-note { background: #388E3C; color: #fff; border-left-color: #81C784; }
        .action-pair.group-3 { background: #FFF3E0; border-color: #FFB74D; }
        .action-pair.group-3 .action-btn-main { background: #FFF3E0; color: #E65100; }
        .action-pair.group-3 .action-btn-note { background: #F57C00; color: #fff; border-left-color: #FFB74D; }
        .action-pair.group-4 { background: #F3E5F5; border-color: #BA68C8; }
        .action-pair.group-4 .action-btn-main { background: #F3E5F5; color: #4A148C; }
        .action-pair.group-4 .action-btn-note { background: #7B1FA2; color: #fff; border-left-color: #BA68C8; }
        .action-pair.group-5 { background: #E0F7FA; border-color: #4DD0E1; }
        .action-pair.group-5 .action-btn-main { background: #E0F7FA; color: #006064; }
        .action-pair.group-5 .action-btn-note { background: #00838F; color: #fff; border-left-color: #4DD0E1; }
        .action-pair.action-leave { background: var(--danger-bg); border-color: var(--warning-red); }
        .action-pair.action-leave .action-btn-main { background: var(--danger-bg); color: var(--warning-red); font-weight: 700; }
        .action-pair.action-leave .action-btn-note { background: var(--warning-red); color: #fff; border-left-color: var(--warning-red); }

        .quick-btn {
            grid-column: 1 / -1;
            padding: 12px;
            background: var(--orange-bg);
            border: 1px solid var(--orange-warning);
            color: #B45309;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
            transition: var(--transition-fast);
        }
        .quick-btn:hover:not(:disabled) { background: #FEF3C7; }
        .quick-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .custom-action-row {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .custom-action-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--neutral-gray-200);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition-fast);
            min-width: 150px;
        }
        .custom-action-input:focus {
            outline: none;
            border-color: var(--police-blue);
            box-shadow: 0 0 0 3px rgba(0, 56, 168, 0.12);
        }
        .custom-action-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: var(--neutral-gray-50);
        }
        .detail-section {
            padding-top: 16px;
            border-top: 1px dashed var(--neutral-gray-200);
            margin-bottom: 24px;
        }
        .trait-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .trait-group strong {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--neutral-gray-800);
        }
        .submit-section {
            padding-top: 20px;
            border-top: 2px solid var(--neutral-gray-200);
            text-align: center;
        }
        .btn-submit {
            background-color: var(--police-blue);
            color: white;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition-fast);
            box-shadow: var(--shadow-md);
        }
        .btn-submit:hover {
            background-color: #001540;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .table-panel {
            background: #fff;
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--neutral-gray-200);
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
        }
        .table-wrap {
            overflow-x: auto;
            margin: 12px 0;
        }
        table {
            min-width: 1100px;
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            border: 1px solid var(--neutral-gray-200);
            padding: 6px;
            text-align: left;
            vertical-align: middle;
        }
        th {
            background-color: var(--neutral-gray-100);
            font-weight: 600;
            white-space: nowrap;
        }
        tbody tr:nth-child(even) { background-color: var(--neutral-gray-50); }
        tbody tr:hover { background-color: rgba(0, 56, 168, 0.04); }
        .table-input {
            width: 100%;
            min-width: 60px;
            padding: 4px 6px;
            font-size: 13px;
            border: 1px solid var(--neutral-gray-200);
            border-radius: var(--radius-sm);
            background: #fff;
            transition: var(--transition-fast);
        }
        .table-input:focus {
            outline: none;
            border-color: var(--police-blue);
            box-shadow: 0 0 0 2px rgba(0, 56, 168, 0.15);
        }
        .table-input.action-input {
            border-color: var(--orange-warning);
            background-color: var(--orange-bg);
        }
        .table-input.action-input:focus {
            background-color: #fff;
        }
        .table-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        .upload-btn {
            flex: 1;
            min-width: 180px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition-fast);
            text-align: center;
            background-color: var(--upload-green);
            color: white;
        }
        .upload-btn:hover { background-color: #1B5E20; }
        .clear-btn {
            flex: 1;
            min-width: 180px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition-fast);
            text-align: center;
            background-color: var(--clear-red);
            color: white;
        }
        .clear-btn:hover { background-color: #B71C1C; }
        .counter-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #7B1FA2;
            border-radius: 50%;
            background: #F3E5F5;
            color: #4A148C;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .counter-btn:hover:not(:disabled) {
            background: #7B1FA2;
            color: #fff;
            transform: scale(1.1);
        }
        .counter-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .counter-btn-group {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 6px;
            flex-shrink: 0;
            background: transparent;
        }
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 16px;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-box {
            background: #fff;
            padding: 24px;
            border-radius: var(--radius-md);
            min-width: 400px;
            max-width: 95%;
            box-shadow: var(--shadow-lg);
            transform: scale(1);
            animation: scaleUp 0.2s ease-out;
        }
        @keyframes scaleUp {
            from { transform: scale(0.95); }
            to { transform: scale(1); }
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--police-blue);
            margin-bottom: 12px;
        }
        .modal-textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            border: 1px solid var(--neutral-gray-200);
            border-radius: var(--radius-sm);
            margin: 10px 0 16px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            transition: var(--transition-fast);
        }
        .modal-textarea:focus {
            outline: none;
            border-color: var(--police-blue);
            box-shadow: 0 0 0 3px rgba(0, 56, 168, 0.12);
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            min-width: 90px;
            transition: var(--transition-fast);
        }
        .modal-save { background: var(--police-blue); color: white; }
        .modal-save:hover { background: #001540; }
        .modal-skip { background: var(--neutral-gray-200); color: #1E293B; }
        .modal-skip:hover { background: var(--neutral-gray-300); }
        .modal-cancel { background: var(--danger-bg); color: var(--warning-red); border: 1px solid var(--warning-red); margin-right: auto; }
        .modal-cancel:hover { background: var(--warning-red); color: white; }
        .back-btn {
            background-color: #64748B;
            color: #fff;
            border: none;
            padding: 10px 30px;
            border-radius: var(--radius-sm);
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .back-btn:hover { background-color: #475569; }

        @media (max-width: 480px) {
            body { padding: 8px; font-size: 12px; }
            .obs-card { padding: 16px; }
            .col-stopwatch { font-size: 28px; }
            .ctrl-btn { padding: 8px 14px; font-size: 13px; }
            .actions-container { grid-template-columns: 1fr; }
            .action-btn-main { font-size: 12px; padding: 6px 10px; min-height: 40px; }
            .action-btn-note { font-size: 12px; padding: 0 8px; min-height: 40px; min-width: 50px; }
            .counter-btn { width: 34px; height: 34px; font-size: 13px; }
            .table-btn-group { flex-direction: column; }
            .table-btn-group button { width: 100%; }
            .global-row .form-item { min-width: 100%; }
            .col-control-btns { width: 100%; justify-content: center; }
            .stopwatch-container { flex-direction: column; align-items: stretch; gap: 8px; }
            .col-stopwatch { text-align: center; }
            .timeline-info-row { flex-direction: column; align-items: flex-start; }
            .custom-action-row { flex-direction: column; }
            .custom-action-input { min-width: auto; }
        }
    </style>
</head>
<body>

    <div class="privacy-banner">
        保密聲明：本觀察系統僅供現場研究、服務質素監察部內部數據分析使用。嚴禁記錄任何可識別報案人身份之個人資料，系統只客觀記錄報案人行為動作，不得留存任何私隱資訊。
    </div>

    <!-- ===== 基礎資訊 ===== -->

    <!-- ============================================================ -->
    <!-- JavaScript -->
    <!-- ============================================================ -->
    <script>
        // ================================================================
        // Google Sheets 設定（請填入您的網址）
        // ================================================================
        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzBfqGZX5G5qeuI3_yvpknyAx-6CEmz5js9O8FEygANZhAPS3jkx9HXIDd1xdMK_LOg/exec';
        const PERSONAL_REPORT_URL = 'https://script.google.com/macros/s/AKfycbwZf8XfVJBL84vTwQQelH9BlZVjyxs-aIyuPmMoNRkJm71-LAqkwYryAnk77XLMJmFmKw/exec';

        // ================================================================
        // 核心數據
        // ================================================================
        const actionGroups = [
            { action: '留意到取票機', group: 'group-1' },
            { action: '留意到自助服務機', group: 'group-1' },
            { action: '留意到網上服務', group: 'group-1' },
            { action: '取票機', group: 'group-2' },
            { action: '櫃枱', group: 'group-2' },
            { action: '自助服務機', group: 'group-2' },
            { action: '等候區', group: 'group-2' },
            { action: '職員諮詢/指示', group: 'group-3' },
            { action: '櫃枱接待報案', group: 'group-4' },
            { action: '完成自助服務機報案', group: 'group-5' },
            { action: '完成網上服務報案', group: 'group-5' }
        ];

        let globalDivision = "";
        let globalPeriod = "";
        let allRecords = [];
        let currentObs = null;
        let syncTimeout = null;

        // ================================================================
        // 初始化
        // ================================================================
        window.addEventListener('DOMContentLoaded', function() {
            const dateInput = document.getElementById('obsDate');
            if (!dateInput.value) {
                const today = new Date();
                dateInput.value = today.getFullYear() + '-' +
                    String(today.getMonth() + 1).padStart(2, '0') + '-' +
                    String(today.getDate()).padStart(2, '0');
            }
            loadLocalStorage();
            if (!currentObs) {
                currentObs = createBlankObsItem();
            }
            renderObservationCard();
            refreshTable();
            setInterval(updateTimer, 1000);
            updateRealTimeClock();
            autoSelectPeriod();
            autoDetectDivision();
        });

        // ================================================================
        // 報案人管理
        // ================================================================
        function generateUniqueCaseId() {
            let prefix = 'TST';
            if (globalDivision.includes('TST')) prefix = 'TST';
            else if (globalDivision.includes('MK')) prefix = 'MK';
            else if (globalDivision.includes('YL')) prefix = 'YL';
            else if (globalDivision.includes('TP')) prefix = 'TP';
            let result = '';
            let isUnique = false;
            let checkLimit = 0;
            while (!isUnique && checkLimit < 1000) {
                const num = Math.floor(Math.random() * 100000000).toString().padStart(8, '0');
                result = prefix + num;
                isUnique = !allRecords.some(r => r.obsIndex === result);
                checkLimit++;
            }
            return result;
        }

        function createBlankObsItem() {
            return {
                id: 'obs_' + Date.now(),
                caseIndex: generateUniqueCaseId(),
                isRunning: false,
                elapsedSeconds: 0,
                startTime: "",
                endTime: "",
                timelineEvents: [],
                gender: '未選擇',
                age: '未選擇',
                ethnicity: '未選擇'
            };
        }

        // ================================================================
        // 渲染觀察卡片
        // ================================================================
        function renderObservationCard() {
            const container = document.getElementById('obsContainer');
            if (!container || !currentObs) return;
            const obs = currentObs;
            const statusText = obs.isRunning ? '計時中' : (obs.elapsedSeconds > 0 ? '已暫停' : '未開始');
            const mins = Math.floor(obs.elapsedSeconds / 60).toString().padStart(2, '0');
            const secs = (obs.elapsedSeconds % 60).toString().padStart(2, '0');
            const cardClass = `obs-card ${obs.isRunning ? 'running' : (obs.elapsedSeconds > 0 ? 'paused' : '')}`;

            const hasPending = obs.timelineEvents.some(e => e.isPending);
            let pendingBannerHtml = "";
            if (hasPending) {
                pendingBannerHtml = `
                    <div class="pending-banner">
                        <span>目前有候補時間點尚未命名（可直接在下方「數據匯總表」內修改）</span>
                        <button class="ctrl-btn btn-start" style="padding: 4px 12px; font-size: 12px; background: var(--orange-warning);" onclick="fillPendingName()">彈窗補齊</button>
                    </div>
                `;
            }

            let actionsHtml = actionGroups.map(item => {
                const act = item.action;
                const group = item.group;
                if (act === '櫃枱接待報案') {
                    const numberBtns = [1, 2, 3, 4, 5].map(num => `
                        <button class="counter-btn" ${!obs.isRunning ? 'disabled' : ''}
                                onclick="recordAction('${num}號櫃枱接待報案')"
                                title="記錄 ${num} 號櫃枱接待報案">${num}</button>
                    `).join('');
                    return `
                        <div class="action-pair ${group}" style="flex-wrap: nowrap;">
                            <button class="action-btn-main" ${!obs.isRunning ? 'disabled' : ''} onclick="recordAction('${act}')">${act}</button>
                            <div class="counter-btn-group">${numberBtns}</div>
                            <button class="action-btn-note" ${!obs.isRunning ? 'disabled' : ''} title="點擊記錄此動作並添加備註" onclick="recordActionWithNote('${act}')">備註</button>
                        </div>
                    `;
                }
                return `
                    <div class="action-pair ${group}">
                        <button class="action-btn-main" ${!obs.isRunning ? 'disabled' : ''} onclick="recordAction('${act}')">${act}</button>
                        <button class="action-btn-note" ${!obs.isRunning ? 'disabled' : ''} title="點擊記錄此動作並添加備註" onclick="recordActionWithNote('${act}')">備註</button>
                    </div>
                `;
            }).join('');

            actionsHtml += `
                <div class="action-pair action-leave">
                    <button class="action-btn-main" ${!obs.isRunning ? 'disabled' : ''} onclick="recordLeaveAction()">離開報案室</button>
                    <button class="action-btn-note" ${!obs.isRunning ? 'disabled' : ''} title="點擊記錄此動作並添加備註" onclick="recordLeaveActionWithNote()">備註</button>
                </div>
            `;

            container.innerHTML = `
                <div class="${cardClass}" data-id="${obs.id}">
                    <div class="col-header">
                        <div class="col-title-wrap">
                            <span class="col-label">報案人編號：</span>
                            <input class="case-id-input-small" value="${obs.caseIndex}" onchange="changeCaseId(this)" placeholder="編號">
                            <span class="col-status">${statusText}</span>
                        </div>
                    </div>
                    <div class="stopwatch-container">
                        <div class="col-stopwatch">${mins}:${secs}</div>
                        <div class="col-control-btns">
                            <button class="ctrl-btn btn-start" ${obs.isRunning ? 'disabled' : ''} onclick="startTimer()">進入報案室 (開始觀察)</button>
                            <button class="ctrl-btn btn-reset" onclick="resetTimer()">取消記錄</button>
                        </div>
                    </div>
                    <div class="col-timeline-section">
                        <div class="timeline-info-row">
                            <span>當前已持續時間：<strong>${mins}:${secs}</strong></span>
                            <span id="realTimeClock">當前時間：--:--:--</span>
                            <span>已記錄事件數：<strong id="timeline-count">${obs.timelineEvents.length}</strong></span>
                        </div>
                        <div class="timeline-wrap" data-timeline-wrap>
                            <div class="timeline-track" data-timeline-track></div>
                            <div class="timeline-now-line" data-timeline-now></div>
                        </div>
                        <div class="timeline-note">首個動作為自動起點，其後標示兩動作之間歷時，紅線為當前時間點。</div>
                    </div>
                    <h4>行為動作記錄</h4>
                    <div class="actions-container">
                        <button class="quick-btn" ${!obs.isRunning ? 'disabled' : ''} onclick="quickMark()">快速記錄當下時間 (後補動作)</button>
                        ${pendingBannerHtml}
                        ${actionsHtml}
                        <div class="custom-action-row">
                            <input class="custom-action-input" placeholder="輸入其他自訂動作，按 Enter 記錄"
                                   onkeydown="if(event.key==='Enter')recordCustomAction(this, false)"
                                   ${!obs.isRunning ? 'disabled' : ''}>
                            <button class="ctrl-btn btn-reset" style="background:#475569; white-space:nowrap; padding: 0 16px; font-size:13px;"
                                    ${!obs.isRunning ? 'disabled' : ''}
                                    onclick="recordCustomAction(document.querySelector('.custom-action-input'), true)">加備註記錄</button>
                        </div>
                    </div>
                    <div class="detail-section">
                        <h4>報案人表觀特徵</h4>
                        <div class="trait-grid">
                            <div class="trait-group">
                                <strong>性別</strong>
                                <div class="btn-group">
                                    <button class="select-btn ${obs.gender==='男'?'active':''}" onclick="setObsTrait('gender', '男', this)">男</button>
                                    <button class="select-btn ${obs.gender==='女'?'active':''}" onclick="setObsTrait('gender', '女', this)">女</button>
                                    <button class="select-btn ${obs.gender==='多人'?'active':''}" onclick="setObsTrait('gender', '多人', this)">多人</button>
                                </div>
                            </div>
                            <div class="trait-group">
                                <strong>年齡層</strong>
                                <div class="btn-group">
                                    <button class="select-btn ${obs.age==='30歲以下'?'active':''}" onclick="setObsTrait('age', '30歲以下', this)">30歲以下</button>
                                    <button class="select-btn ${obs.age==='31-59歲'?'active':''}" onclick="setObsTrait('age', '31-59歲', this)">31-59歲</button>
                                    <button class="select-btn ${obs.age==='60歲以上'?'active':''}" onclick="setObsTrait('age', '60歲以上', this)">60歲以上</button>
                                </div>
                            </div>
                            <div class="trait-group">
                                <strong>族裔</strong>
                                <div class="btn-group">
                                    <button class="select-btn ${obs.ethnicity==='華裔'?'active':''}" onclick="setObsTrait('ethnicity', '華裔', this)">華裔</button>
                                    <button class="select-btn ${obs.ethnicity==='非華裔'?'active':''}" onclick="setObsTrait('ethnicity', '非華裔', this)">非華裔</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="submit-section">
                        <button class="btn-submit" onclick="submitCurrentObservation()">結束觀察</button>
                    </div>
                </div>
            `;
            renderTimelineData();
            updateRealTimeClock();
        }

        // ================================================================
        // 時間線
        // ================================================================
        function renderTimelineData() {
            const wrap = document.querySelector('[data-timeline-wrap]');
            if (!wrap || !currentObs) return;
            wrap.querySelectorAll('.timeline-dot, .timeline-event').forEach(el => el.remove());
            const maxSec = Math.max(currentObs.elapsedSeconds, 60);
            currentObs.timelineEvents.forEach(evt => {
                let percent = (evt.timestamp / maxSec) * 100;
                if (percent > 100) percent = 100;
                let dot = document.createElement('div');
                dot.className = `timeline-dot ${evt.isPending ? 'pending-dot' : ''}`;
                dot.style.left = `${percent}%`;
                wrap.appendChild(dot);
                let box = document.createElement('div');
                box.className = `timeline-event ${evt.isPending ? 'pending-event' : ''}`;
                box.style.left = `${percent}%`;
                const shortAction = evt.action.length > 8 ? evt.action.substring(0, 8) + '..' : evt.action;
                box.innerText = evt.isPending ? `候補(${evt.timestamp}s)` : `${shortAction}(${evt.timestamp}s)`;
                wrap.appendChild(box);
            });
        }

        function updateRealTimeClock() {
            const clock = document.getElementById('realTimeClock');
            if (clock) {
                const now = new Date();
                clock.textContent = `當前時間：${now.toLocaleTimeString('zh-HK', { hour12: false })}`;
            }
        }

        // ================================================================
        // 計時器
        // ================================================================
        function updateTimer() {
            if (currentObs && currentObs.isRunning) {
                currentObs.elapsedSeconds++;
                const timerDiv = document.querySelector('.col-stopwatch');
                if (timerDiv) {
                    const mins = Math.floor(currentObs.elapsedSeconds / 60).toString().padStart(2, '0');
                    const secs = (currentObs.elapsedSeconds % 60).toString().padStart(2, '0');
                    timerDiv.innerText = `${mins}:${secs}`;
                    const timelineInfo = document.querySelector('.col-timeline-section strong');
                    if (timelineInfo) timelineInfo.innerText = `${mins}:${secs}`;
                }
                const nowLine = document.querySelector('[data-timeline-now]');
                if (nowLine) {
                    const maxSec = Math.max(currentObs.elapsedSeconds, 60);
                    let nowPercent = (currentObs.elapsedSeconds / maxSec) * 100;
                    nowLine.style.left = `${nowPercent > 100 ? 100 : nowPercent}%`;
                }
                if (currentObs.elapsedSeconds % 5 === 0) saveLocalStorage();
            }
            updateRealTimeClock();
        }

        function startTimer() {
            if (!currentObs.startTime) {
                currentObs.startTime = new Date().toLocaleTimeString('zh-HK', { hour12: false });
            }
            currentObs.isRunning = true;
            if (currentObs.timelineEvents.length === 0) {
                executeAddEvent('進入報案室', '系統自動生成（開始觀察）', false);
            } else {
                renderObservationCard();
                syncCurrentObsToAllRecords();
                refreshTable();
            }
        }

        function resetTimer() {
            if (confirm("確定要取消當前報案人的所有記錄嗎？(此動作無法復原)")) {
                allRecords = allRecords.filter(r => r.obsIndex !== currentObs.caseIndex);
                currentObs = createBlankObsItem();
                renderObservationCard();
                refreshTable();
                saveLocalStorage();
            }
        }

        // ================================================================
        // 自動選擇
        // ================================================================
        function autoSelectPeriod() {
            const now = new Date();
            const hours = now.getHours();
            let periodName = '';
            if (hours >= 0 && hours < 12) periodName = 'AM';
            else if (hours >= 12 && hours < 18) periodName = 'PM';
            else periodName = 'Evening';
            const buttons = document.querySelectorAll('#periodGroup .select-btn');
            buttons.forEach(btn => {
                if (btn.textContent.trim() === periodName) btn.click();
            });
        }

        function autoDetectDivision() {
            if (!navigator.geolocation) return;
            const divisions = [
                { name: 'TSTDIV RR', label: 'TSTDIV', lat: 22.2948, lng: 114.1710 },
                { name: 'MKDIST RR', label: 'MKDIST', lat: 22.3167, lng: 114.1694 },
                { name: 'YLDIV RR', label: 'YLDIV', lat: 22.4428, lng: 114.0230 },
                { name: 'TPDIV RR', label: 'TPDIV', lat: 22.4506, lng: 114.1640 }
            ];
            function getDistance(lat1, lon1, lat2, lon2) {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            }
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    let nearest = null;
                    let minDistance = Infinity;
                    divisions.forEach(div => {
                        const dist = getDistance(userLat, userLng, div.lat, div.lng);
                        if (dist < minDistance) {
                            minDistance = dist;
                            nearest = div;
                        }
                    });
                    if (nearest) {
                        const buttons = document.querySelectorAll('#divisionGroup .select-btn');
                        buttons.forEach(btn => {
                            if (btn.textContent.trim() === nearest.label) btn.click();
                        });
                    }
                },
                function() {},
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        }

        // ================================================================
        // 動作記錄
        // ================================================================
        function executeAddEvent(actionName, note = "", isPending = false) {
            let lastTime = 0;
            if (currentObs.timelineEvents.length > 0) {
                lastTime = currentObs.timelineEvents[currentObs.timelineEvents.length - 1].timestamp;
            }
            const stageDur = currentObs.elapsedSeconds - lastTime;
            const newEvent = {
                uuid: 'evt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                timestamp: currentObs.elapsedSeconds,
                action: actionName,
                note: note,
                stageDuration: stageDur,
                isPending: isPending,
                recordTime: new Date().toLocaleTimeString('zh-HK', { hour12: false })
            };
            currentObs.timelineEvents.push(newEvent);
            renderObservationCard();
            syncCurrentObsToAllRecords();
            refreshTable();
        }

        function recordAction(actName) {
            executeAddEvent(actName, "", false);
        }

        function recordActionWithNote(actName) {
            openCustomModal({
                title: `為「${actName}」加入動作備註`,
                placeholder: "請填寫有關此動作的詳細情況（非必填）",
                showSkip: true,
                onSave: (noteVal) => {
                    executeAddEvent(actName, noteVal, false);
                }
            });
        }

        function recordLeaveAction() {
            if (!currentObs.isRunning) return;
            const note = prompt("請輸入離開備註（非必填）", "");
            if (note === null) return;
            executeAddEvent('離開報案室', note || '點選自動結案', false);
            currentObs.endTime = new Date().toLocaleTimeString('zh-HK', { hour12: false });
            currentObs.isRunning = false;
            syncCurrentObsToAllRecords();
            alert('報案人已離開！');
            currentObs = createBlankObsItem();
            saveLocalStorage();
            renderObservationCard();
            refreshTable();
        }

        function recordLeaveActionWithNote() {
            if (!currentObs.isRunning) return;
            openCustomModal({
                title: `為「離開報案室」加入備註`,
                placeholder: "請填寫離開時的狀態描述（非必填）",
                showSkip: true,
                onSave: (noteVal) => {
                    executeAddEvent('離開報案室', noteVal || '點選自動結案', false);
                    currentObs.endTime = new Date().toLocaleTimeString('zh-HK', { hour12: false });
                    currentObs.isRunning = false;
                    syncCurrentObsToAllRecords();
                    alert('報案人已離開！');
                    currentObs = createBlankObsItem();
                    saveLocalStorage();
                    renderObservationCard();
                    refreshTable();
                }
            });
        }

        function quickMark() {
            executeAddEvent("", "", true);
        }

        function recordCustomAction(inputEl, forceNote) {
            const val = inputEl.value.trim();
            if (!val) return;
            if (forceNote) {
                openCustomModal({
                    title: `為自訂動作「${val}」加入備註`,
                    placeholder: "請填寫對應備註...",
                    showSkip: true,
                    onSave: (noteVal) => {
                        executeAddEvent(val, noteVal, false);
                        inputEl.value = "";
                    }
                });
            } else {
                executeAddEvent(val, "", false);
                inputEl.value = "";
            }
        }

        function submitCurrentObservation() {
            if (!currentObs || currentObs.timelineEvents.length === 0) {
                alert('當前個案未有任何行為動作記錄！');
                return;
            }
            if (currentObs.timelineEvents.some(e => e.isPending)) {
                alert('請先補齊所有「候補時間點」的動作名稱！');
                return;
            }
            if (!confirm('確認結束當前觀察，開始下一個案件嗎？')) return;

            currentObs.endTime = new Date().toLocaleTimeString('zh-HK', { hour12: false });
            currentObs.isRunning = false;
            syncCurrentObsToAllRecords();

            currentObs = createBlankObsItem();
            saveLocalStorage();
            renderObservationCard();
            refreshTable();
            alert('已結束觀察，開始下一個案件！');
        }

        // ================================================================
        // 上傳至雲端（核心功能）
        // ================================================================
        function uploadToCloud() {
            if (allRecords.length === 0) {
                alert('目前沒有任何記錄可以上傳！');
                return;
            }

            const btn = document.querySelector('.upload-btn');
            const originalText = btn.textContent;
            btn.textContent = '上傳中...';
            btn.disabled = true;

            const observer = document.getElementById('observerName').value || '未填寫';
            const date = document.getElementById('obsDate').value || '未填寫';
            const period = globalPeriod || '未選擇';
            const division = globalDivision || '未選擇';
            const counts = getCountValues();

            // 主試算表數據（全部記錄）
            const mainRecords = allRecords.map(rec => ({
                observer: observer, date: date, period: period, division: division,
                observerCount: counts.observerCount, staffCount: counts.staffCount,
                counterCount: counts.counterCount, obsIndex: rec.obsIndex || '',
                gender: rec.gender || '', age: rec.age || '', ethnicity: rec.ethnicity || '',
                action: rec.action || '', note: rec.note || '',
                stageDuration: rec.stageDuration, totalDuration: rec.totalDuration,
                recordTime: rec.recordTime
            }));

            // 個人報告（只上傳已結束的案件）
            const endedRecords = allRecords.filter(rec => rec.endTime);
            const personalRecords = endedRecords.map(rec => ({
                observer: observer, date: date, period: period, division: division,
                observerCount: counts.observerCount, staffCount: counts.staffCount,
                counterCount: counts.counterCount, obsIndex: rec.obsIndex || '',
                gender: rec.gender || '', age: rec.age || '', ethnicity: rec.ethnicity || '',
                action: rec.action || '', note: rec.note || '',
                stageDuration: rec.stageDuration, totalDuration: rec.totalDuration,
                recordTime: rec.recordTime
            }));

            // 發送到主試算表
            fetch(GOOGLE_SHEETS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mainRecords)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    console.log('主試算表上傳成功，共 ' + result.count + ' 筆');
                    // 發送個人報告
                    if (personalRecords.length > 0) {
                        return fetch(PERSONAL_REPORT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(personalRecords)
                        }).then(response => response.json());
                    }
                    return { success: true };
                } else {
                    throw new Error(result.error || '主試算表上傳失敗');
                }
            })
            .then(result => {
                if (result.success) {
                    alert('數據已成功上傳至雲端！\n主試算表：' + mainRecords.length + ' 筆\n個人報告：' + personalRecords.length + ' 筆');
                } else {
                    throw new Error(result.error || '個人報告上傳失敗');
                }
            })
            .catch(error => {
                console.error('上傳失敗:', error);
                alert('上傳失敗：' + error.message + '\n請檢查網路連線後再試。');
            })
            .finally(() => {
                btn.textContent = originalText;
                btn.disabled = false;
            });
        }

        // ================================================================
        // 清空並下載
        // ================================================================
        function clearAllRecordsWithDownload() {
            if (allRecords.length === 0) {
                alert('目前沒有任何記錄可下載或清空！');
                return;
            }
            if (!confirm('確定要下載並清空所有記錄嗎？\n\n此操作將：\n1. 下載 CSV 檔案\n2. 下載 Excel 報告\n3. 清空所有本地記錄\n\n此操作無法復原！')) {
                return;
            }
            exportCSV();
            setTimeout(() => { exportExcel(); }, 500);
            setTimeout(() => {
                allRecords = [];
                currentObs = createBlankObsItem();
                saveLocalStorage();
                renderObservationCard();
                refreshTable();
                alert('所有記錄已清空！');
            }, 1500);
        }

        // ================================================================
        // 同步記錄
        // ================================================================
        function syncCurrentObsToAllRecords() {
            if (!currentObs) return;
            allRecords = allRecords.filter(r => r.obsIndex !== currentObs.caseIndex);
            const obsName = document.getElementById('observerName').value;
            const oDate = document.getElementById('obsDate').value;
            const counts = getCountValues();

            let ethnicityValue = currentObs.ethnicity;
            if (ethnicityValue === '未選擇' || ethnicityValue === '') ethnicityValue = '不詳';

            currentObs.timelineEvents.forEach(evt => {
                allRecords.push({
                    obsIndex: currentObs.caseIndex,
                    observer: obsName,
                    date: oDate,
                    period: globalPeriod,
                    division: globalDivision,
                    observerCount: counts.observerCount,
                    staffCount: counts.staffCount,
                    counterCount: counts.counterCount,
                    startTime: currentObs.startTime,
                    endTime: currentObs.endTime,
                    gender: currentObs.gender,
                    age: currentObs.age,
                    ethnicity: ethnicityValue,
                    action: evt.action,
                    note: evt.note,
                    stageDuration: evt.stageDuration,
                    totalDuration: evt.timestamp,
                    recordTime: evt.recordTime,
                    uuid: evt.uuid
                });
            });
            saveLocalStorage();
        }

        function getCountValues() {
            const obsCount = parseInt(document.getElementById('observerCount').value) || 0;
            const staffCount = parseInt(document.getElementById('staffCount').value) || 0;
            const counterCount = parseInt(document.getElementById('counterCount').value) || 0;
            return { observerCount: obsCount, staffCount: staffCount, counterCount: counterCount };
        }

        // ================================================================
        // 表格
        // ================================================================
        function refreshTable() {
            const tbody = document.getElementById('data-body');
            if (!tbody) return;
            tbody.innerHTML = '';
            allRecords.forEach(rec => {
                const tr = document.createElement('tr');
                const fields = [
                    { key: 'obsIndex', editable: false },
                    { key: 'observer', editable: true },
                    { key: 'date', editable: true },
                    { key: 'period', editable: true },
                    { key: 'division', editable: true },
                    { key: 'observerCount', editable: true, type: 'number' },
                    { key: 'staffCount', editable: true, type: 'number' },
                    { key: 'counterCount', editable: true, type: 'number' },
                    { key: 'startTime', editable: true },
                    { key: 'endTime', editable: true },
                    { key: 'gender', editable: true },
                    { key: 'age', editable: true },
                    { key: 'ethnicity', editable: true },
                    { key: 'action', editable: true, isAction: true },
                    { key: 'note', editable: true, isNote: true },
                    { key: 'stageDuration', editable: true },
                    { key: 'totalDuration', editable: true },
                    { key: 'recordTime', editable: true }
                ];
                fields.forEach(f => {
                    const td = document.createElement('td');
                    if (f.editable) {
                        const input = document.createElement('input');
                        input.type = f.type === 'number' ? 'number' : 'text';
                        input.className = 'table-input';
                        if (f.isAction) input.classList.add('action-input');
                        let value = rec[f.key] !== undefined ? rec[f.key] : '';
                        if (value === null || value === undefined) value = '';
                        input.value = value;
                        input.placeholder = '...';
                        input.onchange = function() {
                            let val = this.value;
                            if (f.type === 'number') val = parseInt(val) || 0;
                            const recFound = allRecords.find(r => r.uuid === rec.uuid);
                            if (recFound) {
                                recFound[f.key] = val;
                                if (f.key === 'action') recFound.isPending = false;
                                if (currentObs) {
                                    const innerEvt = currentObs.timelineEvents.find(e => e.uuid === rec.uuid);
                                    if (innerEvt) {
                                        innerEvt[f.key] = val;
                                        if (f.key === 'action') innerEvt.isPending = false;
                                    }
                                }
                                saveLocalStorage();
                                const banner = document.querySelector('.pending-banner');
                                if (currentObs) {
                                    const hasPending = currentObs.timelineEvents.some(e => e.isPending);
                                    if (!hasPending && banner) banner.remove();
                                    renderTimelineData();
                                }
                            }
                        };
                        td.appendChild(input);
                    } else {
                        td.textContent = rec.obsIndex || '';
                        td.style.fontWeight = 'bold';
                        td.style.color = 'var(--police-blue)';
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function fillPendingName() {
            const pEvt = currentObs.timelineEvents.find(e => e.isPending);
            if (!pEvt) return;
            openCustomModal({
                title: `命名候補時間點 (${pEvt.timestamp}秒)`,
                placeholder: "請填寫此時間點發生的具體行為動作（必填）",
                showSkip: false,
                onSave: (val) => {
                    if (!val.trim()) {
                        alert('動作名稱不能留空！');
                        return;
                    }
                    pEvt.action = val.trim();
                    pEvt.isPending = false;
                    syncCurrentObsToAllRecords();
                    renderObservationCard();
                    refreshTable();
                    setTimeout(() => {
                        if (currentObs.timelineEvents.some(e => e.isPending)) fillPendingName();
                    }, 200);
                }
            });
        }

        function setObsTrait(trait, val, el) {
            currentObs[trait] = val;
            [...el.parentElement.children].forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            syncCurrentObsToAllRecords();
            refreshTable();
        }

        function changeCaseId(inputEl) {
            const newVal = inputEl.value.trim();
            if (!newVal) {
                inputEl.value = currentObs.caseIndex;
                return;
            }
            allRecords.forEach(r => {
                if (r.obsIndex === currentObs.caseIndex) r.obsIndex = newVal;
            });
            currentObs.caseIndex = newVal;
            saveLocalStorage();
            refreshTable();
        }

        function selectDivision(name, el) {
            globalDivision = name;
            [...el.parentElement.children].forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            saveLocalStorage();
            syncCurrentObsToAllRecords();
            refreshTable();
        }

        function selectPeriod(periodName, el) {
            globalPeriod = periodName;
            [...el.parentElement.children].forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            saveLocalStorage();
            syncCurrentObsToAllRecords();
            refreshTable();
        }

        // ================================================================
        // 匯出功能
        // ================================================================
        function exportCSV() {
            if (allRecords.length === 0) { alert('沒有資料可匯出！'); return; }
            const headers = ['報案人編號', '觀察者', '觀察日期', '觀察時段', '報案室', '觀察員數目', '職員數目', '開放櫃枱數目', '開始時間', '結束時間', '性別', '年齡層', '族裔', '行為動作', '動作備註', '階段歷時(秒)', '總時長(秒)', '記錄時間'];
            let csvContent = "\uFEFF" + headers.join(",") + "\n";
            allRecords.forEach(rec => {
                const row = [
                    rec.obsIndex, rec.observer || '', rec.date || '',
                    rec.period || '', rec.division || '',
                    rec.observerCount !== undefined ? rec.observerCount : '',
                    rec.staffCount !== undefined ? rec.staffCount : '',
                    rec.counterCount !== undefined ? rec.counterCount : '',
                    rec.startTime || '', rec.endTime || '',
                    rec.gender, rec.age, rec.ethnicity,
                    rec.action, rec.note || '',
                    rec.stageDuration, rec.totalDuration, rec.recordTime
                ].map(v => `"${String(v).replace(/"/g, '""')}"`);
                csvContent += row.join(",") + "\n";
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `報案室觀察數據匯總_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function removeEmoji(str) {
            if (!str) return '';
            return str.replace(/[\p{Emoji}\u{FE0F}]/gu, '').trim();
        }

        function exportExcel() {
            if (allRecords.length === 0) { alert('沒有資料可匯出！'); return; }
            const groups = {};
            allRecords.forEach(rec => {
                if (!groups[rec.obsIndex]) groups[rec.obsIndex] = [];
                groups[rec.obsIndex].push(rec);
            });
            const wb = XLSX.utils.book_new();
            for (const [obsIndex, records] of Object.entries(groups)) {
                records.sort((a, b) => (a.recordTime || '').localeCompare(b.recordTime || ''));
                const first = records[0];
                const data = [];
                data.push(['觀察者姓名：', first.observer || '']);
                data.push(['日期：', first.date || '', '時段：', first.period || '', '報案室：', first.division || '']);
                data.push(['觀察開始時間：', first.startTime || '', '觀察完成時間：', first.endTime || '']);
                data.push(['觀察員數目：', first.observerCount || '', '職員數目：', first.staffCount || '', '開放櫃枱數目：', first.counterCount || '']);
                data.push([]);
                data.push(['報案人編號：', obsIndex, '性別：', first.gender || '', '年齡：', first.age || '', '族裔：', first.ethnicity || '']);
                data.push([]);
                data.push(['日期', '記錄時間', '行為動作', '階段歷時(秒)', '總時長(秒)', '備註']);
                records.forEach(rec => {
                    data.push([
                        rec.date || '',
                        rec.recordTime || '',
                        removeEmoji(rec.action || ''),
                        rec.stageDuration !== undefined ? rec.stageDuration : '',
                        rec.totalDuration !== undefined ? rec.totalDuration : '',
                        rec.note || ''
                    ]);
                });
                const ws = XLSX.utils.aoa_to_sheet(data);
                ws['!cols'] = [{ wch: 15 }, { wch: 15 }, { wch: 30 }, { wch: 18 }, { wch: 18 }, { wch: 25 }];
                let sheetName = obsIndex.replace(/[\\:*?/\[\]]/g, '').substring(0, 31);
                XLSX.utils.book_append_sheet(wb, ws, sheetName);
            }
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([wbout], { type: 'application/octet-stream' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `報案室觀察報告_${new Date().toISOString().split('T')[0]}.xlsx`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        // ================================================================
        // 儲存 / 載入
        // ================================================================
        function openCustomModal({ title, placeholder, showSkip, onSave }) {
            const exist = document.getElementById('dynamicModal');
            if (exist) exist.remove();
            const mask = document.createElement('div');
            mask.className = 'modal-mask';
            mask.id = 'dynamicModal';
            mask.innerHTML = `
                <div class="modal-box">
                    <div class="modal-title">${title}</div>
                    <textarea class="modal-textarea" placeholder="${placeholder}"></textarea>
                    <div class="modal-buttons">
                        <button class="modal-btn modal-cancel" id="mCancel">取消</button>
                        ${showSkip ? `<button class="modal-btn modal-skip" id="mSkip">略過備註</button>` : ''}
                        <button class="modal-btn modal-save" id="mSave">確認儲存</button>
                    </div>
                </div>
            `;
            document.body.appendChild(mask);
            const txt = mask.querySelector('.modal-textarea');
            txt.focus();
            mask.querySelector('#mCancel').onclick = () => mask.remove();
            if (showSkip) {
                mask.querySelector('#mSkip').onclick = () => {
                    onSave("");
                    mask.remove();
                };
            }
            mask.querySelector('#mSave').onclick = () => {
                onSave(txt.value.trim());
                mask.remove();
            };
        }

        function saveLocalStorage() {
            localStorage.setItem('observerName', document.getElementById('observerName').value);
            localStorage.setItem('obsDate', document.getElementById('obsDate').value);
            localStorage.setItem('globalDivision', globalDivision);
            localStorage.setItem('globalPeriod', globalPeriod);
            const counts = getCountValues();
            localStorage.setItem('observerCount', counts.observerCount);
            localStorage.setItem('staffCount', counts.staffCount);
            localStorage.setItem('counterCount', counts.counterCount);
            localStorage.setItem('allRecords', JSON.stringify(allRecords));
            localStorage.setItem('currentObs', JSON.stringify(currentObs));
        }

        function loadLocalStorage() {
            if (localStorage.getItem('observerName')) document.getElementById('observerName').value = localStorage.getItem('observerName');
            if (localStorage.getItem('obsDate')) document.getElementById('obsDate').value = localStorage.getItem('obsDate');
            if (localStorage.getItem('observerCount')) document.getElementById('observerCount').value = localStorage.getItem('observerCount');
            if (localStorage.getItem('staffCount')) document.getElementById('staffCount').value = localStorage.getItem('staffCount');
            if (localStorage.getItem('counterCount')) document.getElementById('counterCount').value = localStorage.getItem('counterCount');
            globalDivision = localStorage.getItem('globalDivision') || "";
            globalPeriod = localStorage.getItem('globalPeriod') || "";
            document.querySelectorAll('#divisionGroup .select-btn').forEach(b => {
                if (b.getAttribute('onclick').includes(`'${globalDivision}'`)) b.classList.add('active');
            });
            document.querySelectorAll('#periodGroup .select-btn').forEach(b => {
                if (b.getAttribute('onclick').includes(`'${globalPeriod}'`)) b.classList.add('active');
            });
            allRecords = JSON.parse(localStorage.getItem('allRecords')) || [];
            if (localStorage.getItem('currentObs')) {
                currentObs = JSON.parse(localStorage.getItem('currentObs'));
            }
        }
    </script>
